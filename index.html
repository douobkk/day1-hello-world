<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>저녁메뉴 투표</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Noto Sans KR', sans-serif;
      color: #eee;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      animation: popIn 0.6s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .emoji-header {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 10px;
      animation: bounce 1.5s infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }

    h1 {
      font-size: 1.55rem;
      font-weight: 900;
      text-align: center;
      margin-bottom: 36px;
      background: linear-gradient(90deg, #f9ca24, #f0932b, #eb4d4b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.35;
    }

    .options { display: flex; flex-direction: column; gap: 14px; }

    .option-label {
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px 20px;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .option-label::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(249,202,36,0.15), rgba(240,147,43,0.08));
      opacity: 0;
      transition: opacity 0.25s;
      border-radius: 14px;
    }
    .option-label:hover { border-color: rgba(249,202,36,0.5); transform: translateX(4px); }
    .option-label:hover::before { opacity: 1; }

    input[type="radio"] { display: none; }

    input[type="radio"]:checked + .option-label {
      border-color: #f9ca24;
      background: rgba(249,202,36,0.12);
      box-shadow: 0 0 20px rgba(249,202,36,0.2);
    }
    input[type="radio"]:checked + .option-label::before { opacity: 1; }

    .radio-visual {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    input[type="radio"]:checked + .option-label .radio-visual {
      border-color: #f9ca24;
      background: #f9ca24;
    }
    .radio-visual::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #1a1a2e;
      opacity: 0;
      transition: opacity 0.2s;
    }
    input[type="radio"]:checked + .option-label .radio-visual::after { opacity: 1; }

    .option-icon { font-size: 1.5rem; }
    .option-text { font-size: 1.05rem; font-weight: 700; }

    /* 직접 입력 옵션 */
    .custom-input-wrap {
      display: none;
      margin-top: 8px;
      padding: 0 4px;
      animation: fadeSlide 0.3s ease both;
    }
    @keyframes fadeSlide {
      from { opacity: 0; max-height: 0; }
      to   { opacity: 1; max-height: 80px; }
    }
    .custom-input-wrap.visible { display: block; }

    .custom-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.95rem;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .custom-input::placeholder { color: rgba(255,255,255,0.35); }
    .custom-input:focus { border-color: #f9ca24; }

    .btn-submit {
      margin-top: 32px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 900;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      background: linear-gradient(135deg, #f9ca24, #f0932b);
      color: #1a1a2e;
      box-shadow: 0 6px 24px rgba(249,202,36,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(249,202,36,0.5);
    }
    .btn-submit:active { transform: translateY(0); }

    .error-msg {
      margin-top: 12px;
      text-align: center;
      color: #eb4d4b;
      font-size: 0.88rem;
      min-height: 20px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="emoji-header">🍽️</div>
  <h1>당신의 저녁메뉴에<br>투표하세요!</h1>

  <form id="voteForm" class="options">

    <!-- 옵션 1 -->
    <input type="radio" name="menu" id="opt1" value="그냥 있는밥~">
    <label for="opt1" class="option-label">
      <div class="radio-visual"></div>
      <span class="option-icon">🍚</span>
      <span class="option-text">그냥 있는밥~</span>
    </label>

    <!-- 옵션 2 -->
    <input type="radio" name="menu" id="opt2" value="시켜먹자!">
    <label for="opt2" class="option-label">
      <div class="radio-visual"></div>
      <span class="option-icon">🛵</span>
      <span class="option-text">시켜먹자!</span>
    </label>

    <!-- 옵션 3 (직접 입력) -->
    <input type="radio" name="menu" id="opt3" value="custom">
    <label for="opt3" class="option-label">
      <div class="radio-visual"></div>
      <span class="option-icon">✏️</span>
      <span class="option-text">직접 입력하기…</span>
    </label>

    <div class="custom-input-wrap" id="customWrap">
      <input type="text" class="custom-input" id="customMenu" maxlength="30"
             placeholder="원하는 메뉴를 입력해주세요 (예: 치킨!)">
    </div>

    <p class="error-msg" id="errMsg"></p>
    <button type="submit" class="btn-submit" id="submitBtn">✅ 선택 완료!</button>
  </form>
</div>

<script>
  const opt3 = document.getElementById('opt3');
  const customWrap = document.getElementById('customWrap');
  const customMenu = document.getElementById('customMenu');
  const form = document.getElementById('voteForm');
  const errMsg = document.getElementById('errMsg');

  // 옵션 3 선택 시 입력란 표시
  document.querySelectorAll('input[name="menu"]').forEach(radio => {
    radio.addEventListener('change', () => {
      if (opt3.checked) {
        customWrap.classList.add('visible');
        customMenu.focus();
      } else {
        customWrap.classList.remove('visible');
      }
      errMsg.textContent = '';
    });
  });

  form.addEventListener('submit', e => {
    e.preventDefault();
    const chosen = document.querySelector('input[name="menu"]:checked');

    if (!chosen) {
      errMsg.textContent = '⚠️ 메뉴를 선택해주세요!';
      return;
    }

    let menuValue = chosen.value;

    if (menuValue === 'custom') {
      const txt = customMenu.value.trim();
      if (!txt) {
        errMsg.textContent = '⚠️ 메뉴를 입력해주세요!';
        customMenu.focus();
        return;
      }
      menuValue = txt;
    }

    // localStorage에 투표 누적
    const votes = JSON.parse(localStorage.getItem('dinnerVotes') || '{}');
    votes[menuValue] = (votes[menuValue] || 0) + 1;
    localStorage.setItem('dinnerVotes', JSON.stringify(votes));

    // 결과 페이지로 이동
    window.location.href = 'results.html';
  });
</script>
</body>
</html>
